<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MILLEDOLCEZZE - Crea la tua Candy Box</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>🍬 MILLEDOLCEZZE 🍬</h1>

<p>Il mondo delle caramelle gommose</p>

</header>


<section class="hero">

<h2>Crea la tua Candy Box personalizzata</h2>

<p>Scegli il formato e componi la tua box con i tuoi gusti preferiti.</p>

</section>


<section class="box-scelta">

<h2>1️⃣ Scegli la tua Candy Box</h2>

<div class="box-buttons">

<button onclick="scegliBox('1 kg - €12',10)">Candy Box 1 kg - €12</button>

<button onclick="scegliBox('1.5 kg - €17',12)">Candy Box 1.5 kg - €17</button>

<button onclick="scegliBox('2 kg - €22,50',15)">Candy Box 2 kg - €22,50</button>

</div>

</section>


<div id="boxScelta"></div>


<section id="configuratore">

<h2>2️⃣ Scegli le tue caramelle</h2>

<p id="contatore">
Scegli prima la Candy Box
</p>

<div class="barra">
<div id="progress"></div>
</div>

<input
type="text"
id="ricerca"
placeholder="🔍 Cerca una caramella..."
onkeyup="filtraCaramelle()">


<div class="categorie">

<button onclick="filtraCategoria('Tutte')">
Tutte
</button>

<button onclick="filtraCategoria('Gommose')">
Gommose
</button>

<button onclick="filtraCategoria('Frizzanti')">
Frizzanti
</button>

<button onclick="filtraCategoria('Liquirizia')">
Liquirizia
</button>

<button onclick="filtraCategoria('Marshmallow')">
Marshmallow
</button>

</div>


<div id="caramelle"></div>

</section>


<section class="riepilogo">

<h2>3️⃣ Il tuo ordine</h2>

<ul id="lista"></ul>

<button class="whatsapp" onclick="ordina()">
📲 Ordina su WhatsApp
</button>

</section>


<script src="caramelle.js"></script>
<script src="script.js"></script>

</body>

</html>
